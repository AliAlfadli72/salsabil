<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سلسبيل | مشروبات عالية الجودة من قلب سوريا</title>
    <meta name="description" content="سلسبيل – رواد صناعة المشروبات في سوريا. نقاء الطبيعة، جودة المعايير العالمية، وانتعاش لا مثيل له في كل رشفة." />
    <meta name="keywords" content="سلسبيل, مشروبات, عصائر, مشروبات غازية, سوريا, جودة" />

    <!-- ─── Preload critical above-the-fold images (highest priority) ─── -->
    <link rel="preload" as="image" href="/hero.webp" type="image/webp" />
    <link rel="preload" as="image" href="/logo.webp" type="image/webp" />

    <!-- ─── Google Fonts: ASYNC loading — does NOT block render ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Using the "print → all" trick:
      1. Browser fetches font CSS as print (non-render-blocking)
      2. onload switches it to 'all' — fonts appear after render
      3. noscript fallback for no-JS environments
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- ─── Prefetch product images (used below the fold) ─── -->
    <link rel="prefetch" as="image" href="/pro (1).webp" type="image/webp" />
    <link rel="prefetch" as="image" href="/pro (2).webp" type="image/webp" />
    <link rel="prefetch" as="image" href="/pro (3).webp" type="image/webp" />
    <link rel="prefetch" as="image" href="/bf.webp"      type="image/webp" />

    <!-- ─── Inline critical font fallback so text renders immediately ─── -->
    <style>
      /* FOUT prevention: use system Arabic font until web font loads */
      html { font-family: "Cairo", "Segoe UI", Tahoma, Arial, sans-serif; }
      body { font-display: swap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
